<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="4" y1="24" x2="24" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="line" x1="6" y1="20" x2="26" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Bar chart columns rising left to right -->
  <rect x="5" y="20" width="4" height="7" rx="1.5" fill="url(#accent)" opacity="0.45"/>
  <rect x="11" y="15" width="4" height="12" rx="1.5" fill="url(#accent)" opacity="0.65"/>
  <rect x="17" y="10" width="4" height="17" rx="1.5" fill="url(#accent)" opacity="0.85"/>
  <rect x="23" y="5"  width="4" height="22" rx="1.5" fill="url(#accent)"/>

  <!-- Upward trend line over bars -->
  <polyline
    points="7,21 13,16 19,11 25,6"
    stroke="url(#line)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Dot at tip of trend line -->
  <circle cx="25" cy="6" r="2" fill="#10b981"/>
  <!-- Small arrow head suggesting upward motion -->
  <polyline
    points="22.5,5.5 25,3.5 27.5,5.5"
    stroke="#10b981"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>